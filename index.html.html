<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; font-family: Arial, sans-serif; color: #fff; display: flex; justify-content: center; padding: 10px; }
#app { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; }
.screen { display: none; width: 100%; flex-direction: column; align-items: center; }
.screen.active { display: flex; }
.snake-emoji { font-size: 64px; margin: 20px 0 8px; animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.title { font-size: 40px; font-weight: bold; letter-spacing: 2px; background: linear-gradient(90deg,#4ade80,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { font-size: 13px; color: #888; margin: 4px 0 28px; }
.btn { display: block; width: 240px; padding: 13px; margin: 7px auto; font-size: 15px; font-weight: bold; cursor: pointer; border: 2px solid #333; border-radius: 10px; background: #111; color: #fff; transition: all 0.15s; text-align: center; }
.btn:hover { background: #1a1a2e; border-color: #4ade80; color: #4ade80; }
.btn.red { border-color: #ef4444; color: #ef4444; }
.diff-btn { display: block; width: 280px; padding: 14px 16px; margin: 8px auto; cursor: pointer; border: 2px solid #333; border-radius: 12px; background: #111; color: #fff; text-align: left; transition: all 0.15s; }
.diff-btn:hover { border-color: #4ade80; }
.diff-btn.sel { border-color: #4ade80; background: #0a2a0a; }
.diff-name { font-size: 16px; font-weight: bold; }
.diff-desc { font-size: 12px; color: #888; margin-top: 2px; }
canvas { display: block; border-radius: 12px; border: 2px solid #222; }
.hud { display: flex; gap: 20px; margin: 8px 0; font-size: 13px; color: #aaa; }
.hud b { color: #fff; font-size: 15px; }
.stage-progress { display: flex; gap: 6px; margin-bottom: 8px; }
.sp-dot { width: 36px; height: 7px; border-radius: 4px; background: #222; transition: background 0.4s; }
.sp-dot.done { background: #4ade80; }
.sp-dot.active { background: #fbbf24; }
#dpad { display: none; margin-top: 10px; user-select: none; }
.dpad-row { display: flex; justify-content: center; gap: 4px; margin: 2px 0; }
.dpad-btn { width: 56px; height: 56px; border-radius: 10px; background: #1a1a1a; border: 2px solid #333; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dpad-btn:active { background: #2a2a2a; transform: scale(0.92); }
.hint { font-size: 11px; color: #555; margin-top: 6px; }
.result-icon { font-size: 60px; margin: 20px 0 6px; animation: bob 2s ease-in-out infinite; }
.result-title { font-size: 32px; font-weight: bold; margin-bottom: 4px; }
.stats-row { display: flex; gap: 30px; margin: 16px 0 24px; }
.stat { text-align: center; }
.stat-v { font-size: 26px; font-weight: bold; color: #4ade80; }
.stat-l { font-size: 12px; color: #888; margin-top: 2px; }
@media (max-width: 480px) { #dpad { display: block; } }
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="s-menu">
    <div class="snake-emoji">🐍</div>
    <div class="title">SNAKE</div>
    <div class="subtitle">5 Stages · 4 Difficulties · Realistic Serpent</div>
    <button class="btn" style="border-color:#4ade80;color:#4ade80;" onclick="showDiff()">▶ Play Game</button>
    <button class="btn" onclick="showHow()">? How to Play</button>
  </div>
  <div class="screen" id="s-diff">
    <div style="font-size:22px;font-weight:bold;margin:20px 0 6px;">Select Difficulty</div>
    <div style="font-size:13px;color:#888;margin-bottom:18px;">Choose your challenge</div>
    <div id="diff-list"></div>
    <button class="btn red" style="margin-top:14px;width:180px;" onclick="showMenu()">← Back</button>
  </div>
  <div class="screen" id="s-game">
    <div class="hud">
      <div>Score: <b id="h-score">0</b></div>
      <div>Stage: <b id="h-stage">1</b>/5</div>
      <div>Length: <b id="h-len">3</b></div>
      <div>Best: <b id="h-best">0</b></div>
    </div>
    <div class="stage-progress" id="s-prog"></div>
    <canvas id="gc"></canvas>
    <div id="dpad">
      <div class="dpad-row"><div class="dpad-btn" id="d-up">▲</div></div>
      <div class="dpad-row">
        <div class="dpad-btn" id="d-left">◀</div>
        <div class="dpad-btn" id="d-down">▼</div>
        <div class="dpad-btn" id="d-right">▶</div>
      </div>
    </div>
    <div class="hint">Arrow keys / WASD · Space = pause</div>
  </div>
  <div class="screen" id="s-over">
    <div class="result-icon">💀</div>
    <div class="result-title" style="color:#ef4444;">Game Over</div>
    <div id="over-msg" style="color:#888;font-size:14px;margin-top:4px;"></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-v" id="ov-score">0</div><div class="stat-l">Score</div></div>
      <div class="stat"><div class="stat-v" id="ov-stage">1</div><div class="stat-l">Stage Reached</div></div>
      <div class="stat"><div class="stat-v" id="ov-best">0</div><div class="stat-l">Best</div></div>
    </div>
    <button class="btn" style="border-color:#4ade80;color:#4ade80;" onclick="restartGame()">↺ Try Again</button>
    <button class="btn" onclick="showMenu()">⌂ Menu</button>
  </div>
  <div class="screen" id="s-win">
    <div class="result-icon">🏆</div>
    <div class="result-title" style="color:#fbbf24;">You Won!</div>
    <div style="color:#888;font-size:14px;margin-top:4px;">All 5 stages conquered!</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-v" id="win-score">0</div><div class="stat-l">Final Score</div></div>
      <div class="stat"><div class="stat-v" id="win-best">0</div><div class="stat-l">Best Ever</div></div>
    </div>
    <button class="btn" style="border-color:#4ade80;color:#4ade80;" onclick="restartGame()">▶ Play Again</button>
    <button class="btn" onclick="showMenu()">⌂ Menu</button>
  </div>
</div>
<script>
var CELL=20, COLS=22, ROWS=20, CW, CH;

var STAGES=[
  {name:"Meadow",  bg:"#1a3a1a",grid:"#1e421e",wall:"#5a3e10",food:"#ff4444",glow:"#ff8888",sc1:"#3a7d44",sc2:"#2d6235",sc3:"#1e4526",need:5},
  {name:"Desert",  bg:"#3a2a10",grid:"#3e2e12",wall:"#7a4a10",food:"#ff8c00",glow:"#ffb84d",sc1:"#c8a850",sc2:"#b8942a",sc3:"#8a6d18",need:10,obs:5},
  {name:"Ocean",   bg:"#0a2a3a",grid:"#0c3040",wall:"#062436",food:"#f472b6",glow:"#f9a8d4",sc1:"#1e8fb0",sc2:"#156e8c",sc3:"#0d4f66",need:15,obs:9},
  {name:"Volcano", bg:"#2a0a0a",grid:"#300c0c",wall:"#5a0f0f",food:"#fde68a",glow:"#fef3c7",sc1:"#c0401a",sc2:"#9a2e10",sc3:"#721e08",need:20,obs:13},
  {name:"Space",   bg:"#050510",grid:"#080818",wall:"#4c1d95",food:"#a78bfa",glow:"#c4b5fd",sc1:"#7928ca",sc2:"#5c1e9e",sc3:"#3d1270",need:25,obs:17}
];

var DIFFS=[
  {name:"🌿 Easy",   desc:"Slow speed, fewer obstacles",    speed:200,obm:0.5},
  {name:"⚡ Normal", desc:"Balanced challenge",              speed:130,obm:1.0},
  {name:"🔥 Hard",   desc:"Fast speed, more obstacles",     speed:80, obm:1.5},
  {name:"💀 Extreme",desc:"Lightning speed, max chaos",     speed:45, obm:2.0}
];

var canvas,ctx,raf;
var snake,dir,nextDir,food,walls,score,stageIdx,paused,alive;
var chosenDiff=1,bestScore=0;
var stars=[],foodT=0,animT=0;
var lastTime=0,elapsed=0;
var smoothSnake=[];

function showMenu(){setScreen("s-menu");if(raf){cancelAnimationFrame(raf);raf=null;}document.onkeydown=null;}
function showDiff(){
  setScreen("s-diff");
  var dl=document.getElementById("diff-list");dl.innerHTML="";
  DIFFS.forEach(function(d,i){
    var b=document.createElement("div");
    b.className="diff-btn"+(i===chosenDiff?" sel":"");
    b.innerHTML='<div class="diff-name">'+d.name+'</div><div class="diff-desc">'+d.desc+'</div>';
    b.onclick=function(){chosenDiff=i;startGame();};
    dl.appendChild(b);
  });
}
function showHow(){alert("Arrow keys / WASD to steer the snake.\nEat the glowing food to grow.\nDo not hit walls, obstacles, or yourself.\nFill the stage bar to advance.\nSpace = pause. Good luck!");}
function setScreen(id){
  ["s-menu","s-diff","s-game","s-over","s-win"].forEach(function(s){document.getElementById(s).classList.remove("active");});
  document.getElementById(id).classList.add("active");
}

function startGame(){
  stageIdx=0;score=0;alive=true;paused=false;
  setScreen("s-game");
  CW=COLS*CELL; CH=ROWS*CELL;
  canvas=document.getElementById("gc");
  canvas.width=CW;canvas.height=CH;
  ctx=canvas.getContext("2d");
  loadStage();bindKeys();bindDpad();updateHUD();buildStageBar();
  if(raf)cancelAnimationFrame(raf);
  lastTime=0;elapsed=0;
  raf=requestAnimationFrame(loop);
}
function restartGame(){startGame();}

function loadStage(){
  snake=[{x:5,y:10},{x:4,y:10},{x:3,y:10},{x:2,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  smoothSnake=snake.map(function(s){return{x:s.x*CELL+CELL/2,y:s.y*CELL+CELL/2};});
  walls=makeWalls();
  food=spawnFood();
  foodT=0;
  if(STAGES[stageIdx].name==="Space")makeStars();
}

function makeWalls(){
  var st=STAGES[stageIdx],d=DIFFS[chosenDiff];
  var count=Math.round((st.obs||0)*d.obm);
  var taken={};
  snake.forEach(function(s){taken[s.x+","+s.y]=1;});
  var res=[];
  for(var i=0;i<count*20&&res.length<count;i++){
    var x=1+Math.floor(Math.random()*(COLS-2));
    var y=1+Math.floor(Math.random()*(ROWS-2));
    var k=x+","+y;
    if(!taken[k]&&!(x>=2&&x<=8&&y>=9&&y<=11)){res.push({x:x,y:y});taken[k]=1;}
  }
  return res;
}
function makeStars(){
  stars=[];
  for(var i=0;i<80;i++)stars.push({x:Math.random()*CW,y:Math.random()*CH,r:Math.random()*1.5+0.3,p:Math.random()*6.28});
}
function spawnFood(){
  var taken={};
  snake.forEach(function(s){taken[s.x+","+s.y]=1;});
  walls.forEach(function(w){taken[w.x+","+w.y]=1;});
  var x,y,t=0;
  do{x=Math.floor(Math.random()*COLS);y=Math.floor(Math.random()*ROWS);t++;}while(taken[x+","+y]&&t<1000);
  return{x:x,y:y};
}

function loop(ts){
  raf=requestAnimationFrame(loop);
  if(!lastTime)lastTime=ts;
  var dt=Math.min(ts-lastTime,100);lastTime=ts;
  animT+=dt;
  if(!paused&&alive)elapsed+=dt;
  var speed=DIFFS[chosenDiff].speed;
  if(elapsed>=speed){elapsed=0;step();}
  draw(ts,elapsed/speed);
}

function step(){
  dir={x:nextDir.x,y:nextDir.y};
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){die();return;}
  for(var i=0;i<snake.length;i++){if(snake[i].x===head.x&&snake[i].y===head.y){die();return;}}
  for(var j=0;j<walls.length;j++){if(walls[j].x===head.x&&walls[j].y===head.y){die();return;}}
  snake.unshift(head);
  smoothSnake.unshift({x:head.x*CELL+CELL/2,y:head.y*CELL+CELL/2});
  if(head.x===food.x&&head.y===food.y){
    score++;updateHUD();
    var target=getTarget();
    if(score>=target){
      if(stageIdx===STAGES.length-1){win();return;}
      stageIdx++;buildStageBar();loadStage();
    }else{food=spawnFood();foodT=0;}
  }else{
    snake.pop();smoothSnake.pop();
  }
  foodT+=0.18;
  updateHUD();
}

function getTarget(){var t=0;for(var i=0;i<=stageIdx;i++)t+=STAGES[i].need;return t;}

function die(){
  alive=false;
  if(score>bestScore)bestScore=score;
  document.getElementById("ov-score").textContent=score;
  document.getElementById("ov-stage").textContent=stageIdx+1;
  document.getElementById("ov-best").textContent=bestScore;
  var msgs=["The serpent has fallen!","Ouch! Try again.","So close!","The jungle claims another."];
  document.getElementById("over-msg").textContent=msgs[Math.floor(Math.random()*msgs.length)];
  setTimeout(function(){setScreen("s-over");},400);
}
function win(){
  alive=false;
  if(score>bestScore)bestScore=score;
  document.getElementById("win-score").textContent=score;
  document.getElementById("win-best").textContent=bestScore;
  setTimeout(function(){setScreen("s-win");},400);
}

function updateHUD(){
  document.getElementById("h-score").textContent=score;
  document.getElementById("h-stage").textContent=stageIdx+1;
  document.getElementById("h-len").textContent=snake.length;
  document.getElementById("h-best").textContent=bestScore;
}
function buildStageBar(){
  var bar=document.getElementById("s-prog");bar.innerHTML="";
  for(var i=0;i<STAGES.length;i++){
    var d=document.createElement("div");
    d.className="sp-dot"+(i<stageIdx?" done":i===stageIdx?" active":"");
    d.title=STAGES[i].name;bar.appendChild(d);
  }
}

function draw(ts,lerpT){
  var st=STAGES[stageIdx];
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle=st.bg;ctx.fillRect(0,0,CW,CH);
  if(st.name==="Space")drawStars(ts);
  if(st.name==="Ocean")drawOcean(ts);
  if(st.name==="Volcano")drawLava(ts);
  if(st.name==="Meadow")drawGrass(ts);
  ctx.strokeStyle=st.grid;ctx.lineWidth=0.5;
  for(var x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,CH);ctx.stroke();}
  for(var y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(CW,y*CELL);ctx.stroke();}
  walls.forEach(function(w){
    var px=w.x*CELL,py=w.y*CELL;
    ctx.fillStyle=st.wall;fillRound(px+1,py+1,CELL-2,CELL-2,4);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(px+3,py+3,CELL-6,3);
    ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(px+3,py+CELL-6,CELL-6,3);
  });
  var fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2;
  var pr=7+Math.sin(foodT)*2;
  ctx.save();
  ctx.shadowBlur=24;ctx.shadowColor=st.glow;
  ctx.beginPath();ctx.arc(fx,fy,pr,0,Math.PI*2);
  ctx.fillStyle=st.food;ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle="rgba(255,255,255,0.55)";
  ctx.beginPath();ctx.arc(fx-2.5,fy-2.5,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
  drawRealisticSnake(st,ts);
  var prev=0;for(var k=0;k<stageIdx;k++)prev+=STAGES[k].need;
  var cur=score-prev,tgt=STAGES[stageIdx].need,prog=Math.max(0,Math.min(1,cur/tgt));
  ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(8,CH-14,CW-16,8);
  var g=ctx.createLinearGradient(8,0,CW-16,0);
  g.addColorStop(0,st.sc1);g.addColorStop(1,st.food);
  ctx.fillStyle=g;ctx.fillRect(8,CH-14,(CW-16)*prog,8);
  ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=0.5;ctx.strokeRect(8,CH-14,CW-16,8);
  ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="10px Arial";ctx.textAlign="left";
  ctx.fillText(st.name+" — "+Math.max(0,cur)+"/"+tgt,10,CH-18);
  if(paused){
    ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle="#fff";ctx.font="bold 26px Arial";ctx.textAlign="center";
    ctx.fillText("PAUSED",CW/2,CH/2-10);
    ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="14px Arial";
    ctx.fillText("Space to resume",CW/2,CH/2+18);
  }
}

function drawRealisticSnake(st,ts){
  if(snake.length<2)return;
  var pts=[];
  for(var i=0;i<snake.length;i++){
    pts.push({x:snake[i].x*CELL+CELL/2, y:snake[i].y*CELL+CELL/2});
  }
  var n=pts.length;
  function getR(i){
    var t=i/(n-1);
    if(i===0)return 8.5;
    return 8.5*(1-t*0.65);
  }
  for(var seg=n-2;seg>=0;seg--){
    var p0=pts[seg],p1=pts[seg+1];
    var t=seg/(n-1);
    var r0=getR(seg),r1=getR(seg+1);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);
    ctx.strokeStyle=lerpColor(st.sc1,st.sc3,t*0.8);
    ctx.lineWidth=(r0+r1);
    ctx.lineCap="round";ctx.lineJoin="round";
    ctx.stroke();ctx.restore();
  }
  for(var seg=n-2;seg>=0;seg--){
    var p0=pts[seg],p1=pts[seg+1];
    var t=seg/(n-1);
    var r0=getR(seg);
    var dx=p1.x-p0.x, dy=p1.y-p0.y;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)continue;
    var scaleSpacing=CELL*0.85;
    var steps=Math.max(1,Math.round(len/scaleSpacing));
    for(var si=0;si<steps;si++){
      var frac=(si+0.5)/steps;
      var cx=p0.x+dx*frac, cy=p0.y+dy*frac;
      var scaleR=r0*(1-(t*0.6))*0.55;
      ctx.save();
      ctx.translate(cx,cy);ctx.rotate(Math.atan2(dy,dx));
      ctx.beginPath();ctx.ellipse(0,0,scaleR*1.1,scaleR*0.7,0,0,Math.PI*2);
      ctx.fillStyle="rgba(0,0,0,0.25)";ctx.fill();
      ctx.beginPath();ctx.ellipse(0,-scaleR*0.15,scaleR*0.6,scaleR*0.38,0,0,Math.PI*2);
      ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);
    ctx.strokeStyle="rgba(255,255,255,0.09)";
    ctx.lineWidth=r0*0.55;ctx.lineCap="round";ctx.stroke();ctx.restore();
  }
  if(n>1){
    ctx.save();
    ctx.beginPath();ctx.arc(pts[1].x,pts[1].y,8,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fill();ctx.restore();
  }
  var hx=pts[0].x, hy=pts[0].y;
  var dx2=pts[0].x-(n>1?pts[1].x:pts[0].x-1);
  var dy2=pts[0].y-(n>1?pts[1].y:pts[0].y);
  var hlen=Math.sqrt(dx2*dx2+dy2*dy2)||1;
  var angle=Math.atan2(dy2,dx2);
  ctx.save();
  ctx.translate(hx,hy);ctx.rotate(angle);
  ctx.beginPath();ctx.ellipse(2,0,11,8.5,0,0,Math.PI*2);
  ctx.fillStyle=st.sc1;ctx.fill();
  ctx.beginPath();ctx.ellipse(2,0,11,8.5,0,0,Math.PI*2);
  ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=0.8;ctx.stroke();
  var snoutG=ctx.createRadialGradient(9,0,1,4,0,13);
  snoutG.addColorStop(0,"rgba(0,0,0,0.35)");snoutG.addColorStop(1,"rgba(0,0,0,0)");
  ctx.beginPath();ctx.ellipse(2,0,11,8.5,0,0,Math.PI*2);
  ctx.fillStyle=snoutG;ctx.fill();
  ctx.beginPath();ctx.moveTo(-7,0);ctx.quadraticCurveTo(2,-3.5,11,0);
  ctx.strokeStyle="rgba(0,0,0,0.25)";ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle="rgba(0,0,0,0.7)";
  ctx.beginPath();ctx.ellipse(9,-2.5,1.3,0.9,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(9,2.5,1.3,0.9,-0.3,0,Math.PI*2);ctx.fill();
  var eyeX=3, eyeY=5.5;
  ctx.beginPath();ctx.ellipse(eyeX,eyeY,3.8,3,0,0,Math.PI*2);
  ctx.fillStyle="#f0e8c0";ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeX,-eyeY,3.8,3,0,0,Math.PI*2);
  ctx.fillStyle="#f0e8c0";ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeX,eyeY,2.4,2.2,0,0,Math.PI*2);
  ctx.fillStyle="#c8a020";ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeX,-eyeY,2.4,2.2,0,0,Math.PI*2);
  ctx.fillStyle="#c8a020";ctx.fill();
  ctx.fillStyle="#050505";
  ctx.beginPath();ctx.ellipse(eyeX,eyeY,0.9,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeX,-eyeY,0.9,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.75)";
  ctx.beginPath();ctx.arc(eyeX+0.8,eyeY-1.2,0.9,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eyeX+0.8,-eyeY-1.2,0.9,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=0.8;
  ctx.beginPath();ctx.ellipse(eyeX,eyeY,3.8,3,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(eyeX,-eyeY,3.8,3,0,0,Math.PI*2);ctx.stroke();
  var tongueWave=Math.sin(animT*0.008)*2;
  ctx.strokeStyle="#e83030";ctx.lineWidth=1.2;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(16,tongueWave);ctx.stroke();
  ctx.beginPath();ctx.moveTo(16,tongueWave);ctx.lineTo(20,tongueWave-3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(16,tongueWave);ctx.lineTo(20,tongueWave+3);ctx.stroke();
  ctx.restore();
}

function fillRound(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function lerpColor(hex1,hex2,t){
  var r1=parseInt(hex1.slice(1,3),16),g1=parseInt(hex1.slice(3,5),16),b1=parseInt(hex1.slice(5,7),16);
  var r2=parseInt(hex2.slice(1,3),16),g2=parseInt(hex2.slice(3,5),16),b2=parseInt(hex2.slice(5,7),16);
  return "#"+[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)].map(function(v){return v.toString(16).padStart(2,"0");}).join("");
}
function drawStars(ts){stars.forEach(function(s){var f=0.4+0.6*Math.abs(Math.sin(ts/600+s.p));ctx.fillStyle="rgba(255,255,255,"+f.toFixed(2)+")";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});}
function drawOcean(ts){ctx.fillStyle="rgba(56,189,248,0.07)";var off=Math.floor(ts/500)%8;for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++)if((x+y+off)%8===0)ctx.fillRect(x*CELL,y*CELL,CELL,CELL);}
function drawLava(ts){ctx.fillStyle="rgba(249,115,22,0.09)";var off=Math.floor(ts/250)%11;for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++)if((x*3+y*5+off)%13===0)ctx.fillRect(x*CELL,y*CELL,CELL,CELL);}
function drawGrass(ts){ctx.fillStyle="rgba(74,222,128,0.06)";for(var i=0;i<25;i++){var px=((i*113+Math.floor(ts/1200))%COLS)*CELL,py=((i*53)%ROWS)*CELL;ctx.fillRect(px,py,CELL,CELL);}}

function bindKeys(){
  document.onkeydown=function(e){
    if(e.code==="Space"){paused=!paused;e.preventDefault();return;}
    if(!alive||paused)return;
    if((e.key==="ArrowUp"||e.key==="w"||e.key==="W")&&dir.y!==1)nextDir={x:0,y:-1};
    else if((e.key==="ArrowDown"||e.key==="s"||e.key==="S")&&dir.y!==-1)nextDir={x:0,y:1};
    else if((e.key==="ArrowLeft"||e.key==="a"||e.key==="A")&&dir.x!==1)nextDir={x:-1,y:0};
    else if((e.key==="ArrowRight"||e.key==="d"||e.key==="D")&&dir.x!==-1)nextDir={x:1,y:0};
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key))e.preventDefault();
  };
}
function bindDpad(){
  var map={"d-up":function(){if(dir.y!==1)nextDir={x:0,y:-1};},"d-down":function(){if(dir.y!==-1)nextDir={x:0,y:1};},"d-left":function(){if(dir.x!==1)nextDir={x:-1,y:0};},"d-right":function(){if(dir.x!==-1)nextDir={x:1,y:0};}};
  Object.keys(map).forEach(function(id){var el=document.getElementById(id);if(!el)return;el.addEventListener("touchstart",function(e){e.preventDefault();if(alive&&!paused)map[id]();},{passive:false});el.addEventListener("mousedown",function(){if(alive&&!paused)map[id]();});});
}
</script>
